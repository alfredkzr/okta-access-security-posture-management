services:
  caddy:
    image: caddy:2-alpine
    ports: ["80:80", "443:443"]
    volumes: ["./Caddyfile:/etc/caddy/Caddyfile", "caddy_data:/data", "caddy_config:/config"]
    depends_on: [backend, frontend]

  backend:
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --workers 4
    restart: always
    deploy: { resources: { limits: { memory: 1G } } }

  worker:
    restart: always
    deploy: { resources: { limits: { memory: 512M } } }

  db:
    restart: always
    volumes: ["/opt/aspm/pgdata:/var/lib/postgresql/data"]

volumes:
  caddy_data:
  caddy_config:
