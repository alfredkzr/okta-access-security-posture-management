services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: aspm
      POSTGRES_USER: aspm
      POSTGRES_PASSWORD: aspm
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aspm"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: .
    entrypoint: ["./docker-entrypoint.sh"]
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    ports: ["8000:8000"]
    volumes: [".:/app", "reports:/data/reports"]
    restart: unless-stopped
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }

  worker:
    build: .
    entrypoint: ["./docker-entrypoint.sh"]
    command: python -m saq src.tasks.worker.settings
    env_file: .env
    volumes: [".:/app", "reports:/data/reports"]
    restart: unless-stopped
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }

  frontend:
    build:
      context: ./frontend
      target: dev
    environment:
      - API_URL=http://backend:8000
    ports: ["5173:5173"]
    volumes: ["./frontend:/app", "/app/node_modules"]
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  pgdata:
  reports:
